  <!-- Static OG fallback for non-JS social crawlers (WhatsApp, Facebook, iMessage).
       react-helmet-async replaces these on hydration for JS-enabled crawlers. -->

  <meta property="og:description" content="360Ghar helps you buy, rent, and compare verified properties in Gurugram with 360° virtual tours, locality intelligence, and AI-assisted real estate workflows." />

  <meta name="twitter:description" content="360Ghar helps you buy, rent, and compare verified properties in Gurugram with 360° virtual tours, locality intelligence, and AI-assisted real estate workflows." />

  <!-- Google tag (gtag.js) — deferred to idle so it never competes with first paint -->
  <script>
    // Minimal gtag stub: buffers calls until the real gtag.js loads.
    // Placed inline at <script> weight (~100 bytes) so gtag() is always safe to call.
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    // Defer the actual gtag.js network request until the browser is idle
    // (or after 2s on browsers without requestIdleCallback, like Safari).
    // This prevents gtag from competing with the hero image / first paint.
    function loadGtag() {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-0S1Q7466MM';
      document.head.appendChild(s);
      gtag('config', 'G-0S1Q7466MM');
    }
    if ('requestIdleCallback' in window) {
      requestIdleCallback(loadGtag);
    } else {
      setTimeout(loadGtag, 2000);
    }
  </script>

  <!-- Favicons — properly sized (were a 2048px image: 489 KB PNG + 118 KB WebP) -->
  <link rel="icon" type="image/webp" href="%BASE_URL%assets/images/logo/favicon.webp">

  <!-- Critical CSS inline for above-the-fold content -->
  <style>
    body {
      margin: 0;
      font-family: 'Josefin Sans', system-ui, -apple-system, sans-serif;
    }

    #root {
      min-height: 100vh;
      display: flex;

  </style>

  <!-- Performance: preconnect for external resources -->
  <link rel="preconnect" href="https://api.360ghar.com">
  <link rel="dns-prefetch" href="https://api.360ghar.com">
  <link rel="preconnect" href="https://www.googletagmanager.com">
  <link rel="dns-prefetch" href="https://www.googletagmanager.com">
  <link rel="preconnect" href="https://www.google-analytics.com">
  <link rel="dns-prefetch" href="https://www.google-analytics.com">

  <!-- Self-hosted brand fonts — NOT preloaded. The LCP element is the hero
       image, not text; preloading fonts would steal its bandwidth on slow
       mobile. font-display: swap (below) renders text in the system font
       immediately and swaps in the brand font once it loads lazily. -->
  <style>
    @font-face { font-family: 'Cinzel'; font-style: normal; font-weight: 400; font-display: swap; src: url('%BASE_URL%assets/fonts/cinzel-latin.woff2') format('woff2'); }
    @font-face { font-family: 'Cinzel'; font-style: normal; font-weight: 700; font-display: swap; src: url('%BASE_URL%assets/fonts/cinzel-latin-700.woff2') format('woff2'); }
    @font-face { font-family: 'Josefin Sans'; font-style: normal; font-weight: 400; font-display: swap; src: url('%BASE_URL%assets/fonts/josefin-sans-latin.woff2') format('woff2'); }
    @font-face { font-family: 'Josefin Sans'; font-style: normal; font-weight: 600; font-display: swap; src: url('%BASE_URL%assets/fonts/josefin-sans-latin-variable.woff2') format('woff2'); }
    @font-face { font-family: 'Josefin Sans'; font-style: normal; font-weight: 700; font-display: swap; src: url('%BASE_URL%assets/fonts/josefin-sans-latin-variable.woff2') format('woff2'); }
  </style>

  <!-- Preload LCP hero image (responsive, AVIF — ~36% smaller than WebP).
       srcset must match the <picture> in BannerThree.jsx so the browser
       preloads the exact variant it will render, avoiding a double fetch. -->
  <link rel="preload" as="image" fetchpriority="high" href="%BASE_URL%assets/images/thumbs/banner-three.avif" imagesrcset="%BASE_URL%assets/images/thumbs/banner-three-320w.avif 320w, %BASE_URL%assets/images/thumbs/banner-three-480w.avif 480w, %BASE_URL%assets/images/thumbs/banner-three-640w.avif 640w, %BASE_URL%assets/images/thumbs/banner-three-768w.avif 768w, %BASE_URL%assets/images/thumbs/banner-three-1024w.avif 1024w" imagesizes="(max-width: 768px) 100vw, 50vw">

  <!-- Font Awesome woff2 (126 KB) NOT preloaded — it competes with the LCP hero image
       for bandwidth. Icons render via CSS after first paint; the font loads lazily. -->

  <!-- Deferred CSS loading using media="print" pattern -->
  <!-- Bootstrap -->
  <link rel="stylesheet" href="%BASE_URL%assets/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="%BASE_URL%assets/css/fontawesome-all.min.css" media="print" onload="this.media='all'">

  <!-- Fallback for no-JS browsers. fonts.css removed: @font-face declarations are
       already inlined in <head> above, so the separate CSS file is redundant. -->
  <noscript>
    <link rel="stylesheet" href="%BASE_URL%assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="%BASE_URL%assets/css/fontawesome-all.min.css">
  </noscript>
</head>
